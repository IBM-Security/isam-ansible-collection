---
# Default variables to configure http transformation rules
http_transformations: [] # noqa: var-naming[no-role-prefix]
# Default variable to skip certain tasks
skip_exports: false # noqa: var-naming[no-role-prefix]

# filter variables to limit execution at runtime
transformation_action: "{{ item.transformation_action }}" # noqa: var-naming[no-role-prefix]
id: "{{ item.id if(item.id is defined) }}" # noqa: var-naming[no-role-prefix]
filename: "{{ item.filename if(item.filename is defined) }}" # noqa: var-naming[no-role-prefix]
