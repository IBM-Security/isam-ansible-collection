# main task to upload keytab files
# Example:
# - hosts: "all"
#   connection: local
#   gather_facts: False
#   tasks:
#    - name: Upload keytabs
#      tags: ["keytab"]
#      import_role:
#        name: web/upload_kerberos_keytab_files
#      vars:
#        keytab_files
#        -  id: keytab.tab
#           file: /path/to/keytab.tab
#        -  id: keytab2.tab
