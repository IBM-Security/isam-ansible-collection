---
- name: Upload keytab files
  ibm.isam.isam:
    log: "{{ log_level | default(omit) }}"
    force: "{{ force | default(omit) }}"
    action: ibmsecurity.isam.web.kerberos_configuration.keyfiles.import_keytab
    isamapi:
      id: "{{ item.id }}"
      file: "{{ item.file }}"
  with_items: "{{ keytab_files }}"
  notify: Commit Changes
